<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <defs>
    <linearGradient id="leftArc" x1="70" y1="22" x2="28" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Right arc: top → bottom-right, CW, pink -->
  <path d="M 70,22 A 48,48 0 0 1 112,94"
    fill="none" stroke="#ec4899" stroke-width="7" stroke-linecap="round"/>

  <!-- Left arc: top → bottom-left, CCW, pink→purple -->
  <path d="M 70,22 A 48,48 0 0 0 28,94"
    fill="none" stroke="url(#leftArc)" stroke-width="7" stroke-linecap="round"/>

  <!-- Bottom arc: bottom-left → bottom-right, CCW, dark -->
  <path d="M 28,94 A 48,48 0 0 0 112,94"
    fill="none" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>

  <!-- osu! target rings -->
  <circle cx="70" cy="70" r="5"  fill="#ec4899"/>
  <circle cx="70" cy="70" r="11" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <circle cx="70" cy="70" r="18" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.35"/>
  <circle cx="70" cy="70" r="25" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.2"/>

  <!-- Sparkle -->
  <g transform="translate(91,50)" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round">
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="-5" y1="0" x2="5" y2="0"/>
  </g>

  <!-- Accent dots -->
  <circle cx="52" cy="50" r="2"   fill="#ec4899" opacity="0.45"/>
  <circle cx="94" cy="82" r="1.5" fill="#ec4899" opacity="0.3"/>
  <circle cx="50" cy="84" r="1.5" fill="#818cf8" opacity="0.5"/>

  <!-- Top smiley — pink -->
  <circle cx="70" cy="22" r="14" fill="#ec4899"/>
  <circle cx="66" cy="19"  r="1.8" fill="white"/>
  <circle cx="74" cy="19"  r="1.8" fill="white"/>
  <path d="M 66,26 Q 70,30 74,26" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom-right smiley — pink -->
  <circle cx="112" cy="94" r="11" fill="#ec4899"/>
  <circle cx="109" cy="91" r="1.4" fill="white"/>
  <circle cx="115" cy="91" r="1.4" fill="white"/>
  <path d="M 109,97 Q 112,101 115,97" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Bottom-left smiley — purple -->
  <circle cx="28" cy="94" r="10" fill="#818cf8"/>
  <circle cx="25" cy="91" r="1.3" fill="white"/>
  <circle cx="31" cy="91" r="1.3" fill="white"/>
  <path d="M 25,97 Q 28,101 31,97" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
</svg>
